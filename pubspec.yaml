name: iot_devkit
description: A new Flutter project for IoT MQTT Device Simulation.
publish_to: "none"
version: 1.10.5

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core dependencies
  mqtt_client: ^10.0.1
  typed_data: ^1.4.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  uuid: ^4.2.1
  intl: ^0.20.2
  logging: ^1.2.0
  file_picker: ^8.0.0
  window_manager: ^0.3.9
  archive: ^3.6.1

  # UI (Optional, but useful for icons if not using material default)
  cupertino_icons: ^1.0.8
  package_info_plus: ^8.1.0
  fl_chart: ^1.1.1

  path: any
  basic_utils: ^5.5.4
  pointycastle: ^3.9.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1
  flutter_distributor: ^0.3.1

  # UI 一致性治理（L1 静态 + L2 视觉回归）
  golden_toolkit: ^0.15.0
  custom_lint: ^0.6.4
  lab_lints:
    path: tooling/lab_lints

flutter_launcher_icons:
  android: false
  ios: false
  image_path: "assets/icon/original_icon.png"
  macos:
    generate: true
    image_path: "assets/icon/original_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/original_icon.png"
  linux:
    generate: true
    image_path: "assets/icon/original_icon.png"

flutter:
  generate: true
  uses-material-design: true

  # basic assets config if needed later
  assets:
    - assets/icon/

  # Lab Console design system fonts (variable TTFs — weight axis honored automatically)
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono.ttf
